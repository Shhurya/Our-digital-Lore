<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Jar for My Babu</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff85a1;
            --soft-white: #fffcf2;
            --text: #5e548e;
        }

        body {
            background-color: #f8edeb;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--text);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .jar-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .jar-container:hover { transform: scale(1.05); }
        .jar-container:active { transform: scale(0.95); }

        /* The "Jar" Shape */
        .jar {
            width: 150px;
            height: 200px;
            background: rgba(255, 255, 255, 0.4);
            border: 4px solid #fff;
            border-radius: 20px 20px 60px 60px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .jar::before { /* The Jar Lid */
            content: '';
            position: absolute;
            top: -15px;
            width: 100px;
            height: 20px;
            background: var(--pink);
            border-radius: 10px;
        }

        /* Floating Message Card */
        #message-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 280px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #message-display.show {
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }

        .heart { color: var(--pink); font-size: 2rem; margin-bottom: 15px; }
        .note { font-family: 'Dancing Script', cursive; font-size: 1.5rem; color: var(--text); line-height: 1.4; }

        .btn {
            margin-top: 20px;
            background: var(--pink);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
        }
    </style>
</head>
<body>

    <h1>A Jar for My Babu.. 🍯</h1>
    <p style="color: #888; margin-bottom: 30px;">Tap the jar when you need a reminder.</p>

    <div class="jar-container" onclick="pullMessage()">
        <div class="jar">
            <span style="font-size: 3rem;">❤️</span>
        </div>
    </div>

    <div id="message-display">
        <div class="heart">💌</div>
        <p class="note" id="note-text"></p>
        <button class="btn" onclick="closeNote(event)">Put it back</button>
    </div>

    <script>
        // --- YOUR DATA ARRAY ---
        const myMessages = [
            "I love how your eyes crinkle when you laugh. 🥹",
            "I'm sorry if I'm ever unavailable, you're always my priority.",
            "You are the best part of my 'forever lore'.",
            "Remember: I am always trying my best for us. ❤️",
            "You make even the most boring days feel like an adventure.",
            "I love you more than words can actually put into code. 🥰",
            "You're my favorite person to do absolutely nothing with."
        ];

        const display = document.getElementById('message-display');
        const text = document.getElementById('note-text');

        function pullMessage() {
            // Logic: Random Index (just like Random.Range in C#)
            const randomIndex = Math.floor(Math.random() * myMessages.length);
            text.innerText = myMessages[randomIndex];
            display.classList.add('show');
        }

        function closeNote(event) {
            event.stopPropagation(); // Prevents re-triggering the jar click
            display.classList.remove('show');
        }
    </script>
</body>
</html>
